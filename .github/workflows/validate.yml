name: Validate Capital Intelligence Platform

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall -q core intelligence committee economic_regime providers

      - name: Initialize platform
        run: python initialize.py

      - name: Run intelligence engine
        run: python run_intelligence.py

      - name: Run automated tests
        run: pytest -q
